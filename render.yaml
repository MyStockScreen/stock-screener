services:
  - type: web
    name: stock-screener
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: TD_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
